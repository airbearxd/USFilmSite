<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DEATH BLOSSOM - ShitFromTheSandbox</title>

  <style>
    @font-face {
      font-family: 'Army';
      src: url('army.otf') format('opentype');
      font-style: normal;
      font-weight: normal;
    }

    html, body {
      margin: 0;
      height: 100%;
      font-family: 'Army', Arial, sans-serif;
      background: url('media/backCamo.png') no-repeat center center fixed;
      background-size: cover;
      overflow-x: hidden;
      overflow-y: auto;
    }

    .home-button {
      position: absolute;
      left: 20px; 
      top: 20px;
      width: 140px;
      height: 140px;
      cursor: pointer;
      clip-path: circle(50% at 50% 50%);
      -webkit-clip-path: circle(50% at 50% 50%);
      z-index: 20;
    }

    .home-button img {
      width: 100%;
      height: auto;
      display: block;
      pointer-events: none;
    }

    .page-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 30px 20px 100px 20px;
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
    }

    .page-center h1 {
      font-size: 60px;
      margin-bottom: 20px;
      letter-spacing: 2px;
      font-weight: normal;
    }

    .page-center h2 {
      font-size: 40px;
      margin-bottom: 20px;
      letter-spacing: 2px;
      font-weight: normal;
    }

    .page-center p {
      font-size: 18px;
      color: black;
      letter-spacing: 1px;
      font-weight: normal;
      margin-bottom: 40px;
    }

    .page-center video {
      width: 100%;
      max-width: 900px;
      height: auto;
      margin-bottom: 40px;
      border: 2px solid #a68a5f;
    }

    .page-center img {
      width: 100%;
      max-width: 900px;
      height: auto;
      margin-bottom: 35px;
      border: 2px solid #a68a5f;
    }
  </style>
</head>
<body>

  <!-- HOME GIF BUTTON -->
  <a href="index.html" class="home-button">
    <img src="media/HOME.gif" alt="Home">
  </a>

  <div class="page-center">
    <h1>DEATH BLOSSOM</h1>

    <h2>SYLVIA VIDEO</h2>

    <!-- Video -->
    <video src="plmedia/sylviavideo.mp4" controls autoplay loop unmuted></video>

    <!-- Images -->
    <img src="plmedia/Pitch  (1)-67.png" alt="Pitch 67">
    <img src="plmedia/Pitch  (1)-68.png" alt="Pitch 68">
    <img src="plmedia/Pitch  (1)-69.png" alt="Pitch 69">
    <img src="plmedia/Pitch  (1)-70.png" alt="Pitch 70">
    <img src="plmedia/Pitch  (1)-71.png" alt="Pitch 71">
  </div>

</body>
</html>
